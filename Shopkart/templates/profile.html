{% extends "base.html" %}

{% block title %}Profile | Vivaantra{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl border border-stone-200 overflow-hidden">
    <div class="px-8 py-10 sm:px-12">
        <div class="text-center mb-8">
            <span class="text-xs font-bold uppercase tracking-widest text-emerald-800 bg-emerald-50 px-3 py-1.5 rounded-full inline-block">My Profile</span>
            <h1 class="font-serif text-4xl md:text-5xl font-medium tracking-tight mt-6 text-emerald-950">Hi, {{ profile.name }}.</h1>
            <p class="text-sm text-stone-500 max-w-lg mx-auto leading-relaxed mt-3">Update your contact details, profile bio, and account information anytime.</p>
        </div>

        {% if message %}
        <div class="mb-6 rounded-2xl bg-emerald-50 border border-emerald-100 text-emerald-900 px-4 py-3 text-sm">
            {{ message }}
        </div>
        {% endif %}

        <form method="post" class="space-y-5">
            <div>
                <label class="block text-[11px] uppercase tracking-wider text-stone-500 font-bold mb-2">Username</label>
                <input type="text" value="{{ profile.username }}" disabled class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm text-stone-900" />
            </div>
            <div>
                <label class="block text-[11px] uppercase tracking-wider text-stone-500 font-bold mb-2">Full name</label>
                <input type="text" name="name" value="{{ profile.name }}" required class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-emerald-800/20 focus:border-emerald-800" />
            </div>
            <div>
                <label class="block text-[11px] uppercase tracking-wider text-stone-500 font-bold mb-2">Email</label>
                <input type="email" name="email" value="{{ profile.email }}" required class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-emerald-800/20 focus:border-emerald-800" />
            </div>
            <div>
                <label class="block text-[11px] uppercase tracking-wider text-stone-500 font-bold mb-2">Bio</label>
                <textarea name="bio" rows="4" class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-emerald-800/20 focus:border-emerald-800">{{ profile.bio }}</textarea>
            </div>
            <button type="submit" class="w-full bg-emerald-800 text-white text-sm font-semibold px-4 py-3 rounded-2xl hover:bg-emerald-900 transition-all">Save changes</button>
        </form>
    </div>
</section>
{% endblock %}
